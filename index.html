<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드_v2</title>
    
    <!-- 폰트: Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse (CSV Parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); padding: 1.5rem; }
        .table-container { max-height: 500px; overflow-y: auto; }
        
        /* 로딩 스피너 (주황색 테마 적용) */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ea580c; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- 헤더 -->
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">우리 동네 아파트 실거래가 대시보드 <span class="text-lg text-orange-500">v2</span></h1>
                <p class="text-slate-500 mt-2">최근 아파트 거래 동향과 상세 내역을 한눈에 확인하세요.</p>
            </div>
            
            <div class="flex flex-col items-start md:items-end gap-3">
                <div id="lastUpdated" class="text-sm text-slate-400 font-medium"></div>
                <!-- 법정동 필터 컨테이너 -->
                <div id="filterContainer" class="hidden flex items-center gap-2 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                    <label for="dongFilter" class="text-sm font-semibold text-slate-700">법정동 필터:</label>
                    <select id="dongFilter" class="bg-transparent text-slate-800 text-sm font-bold focus:outline-none cursor-pointer border-none outline-none pr-2">
                        <option value="all">전체</option>
                        <!-- 동적으로 추가될 옵션들 -->
                    </select>
                </div>
            </div>
        </header>

        <!-- 로딩 화면 -->
        <div id="loadingScreen" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-medium">데이터를 불러오는 중입니다...</p>
        </div>

        <!-- 대시보드 컨텐츠 (데이터 로드 후 표시) -->
        <div id="dashboardContent" class="hidden space-y-6">
            
            <!-- 요약 카드 (Metrics) -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- 검정 계열 -->
                <div class="card border-l-4 border-slate-800">
                    <h3 class="text-sm font-semibold text-slate-500 uppercase">전체 거래 건수</h3>
                    <p id="totalCount" class="text-3xl font-bold text-slate-800 mt-2">0<span class="text-lg font-normal text-slate-500 ml-1">건</span></p>
                </div>
                <!-- 주황 계열 -->
                <div class="card border-l-4 border-orange-500">
                    <h3 class="text-sm font-semibold text-slate-500 uppercase">평균 거래가격</h3>
                    <p id="avgPrice" class="text-2xl font-bold text-orange-600 mt-2">0</p>
                </div>
                <!-- 노랑/앰버 계열 -->
                <div class="card border-l-4 border-amber-500">
                    <h3 class="text-sm font-semibold text-slate-500 uppercase">최고 거래가격</h3>
                    <p id="maxPrice" class="text-2xl font-bold text-amber-600 mt-2">0</p>
                </div>
                <!-- 보색 (청록) 계열 -->
                <div class="card border-l-4 border-cyan-600">
                    <h3 class="text-sm font-semibold text-slate-500 uppercase">최저 거래가격</h3>
                    <p id="minPrice" class="text-2xl font-bold text-cyan-600 mt-2">0</p>
                </div>
            </div>

            <!-- 차트 영역 -->
            <div class="card">
                <h2 class="text-lg font-bold text-slate-800 mb-4">월별 평균 거래가격 추이</h2>
                <div class="relative h-72 w-full">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 데이터 테이블 영역 -->
            <div class="card pb-0 overflow-hidden pr-0">
                <div class="pr-6 pb-4">
                    <h2 class="text-lg font-bold text-slate-800">최근 거래 목록</h2>
                    <p class="text-sm text-slate-500">최신 거래일자 순으로 정렬되어 있습니다.</p>
                </div>
                
                <div class="table-container pr-4 pb-6">
                    <table class="min-w-full divide-y divide-slate-200 text-sm">
                        <thead class="bg-slate-50 sticky top-0">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-left font-semibold text-slate-600">거래일자</th>
                                <th scope="col" class="px-4 py-3 text-left font-semibold text-slate-600">법정동</th>
                                <th scope="col" class="px-4 py-3 text-left font-semibold text-slate-600">아파트명</th>
                                <th scope="col" class="px-4 py-3 text-right font-semibold text-slate-600">전용면적(㎡)</th>
                                <th scope="col" class="px-4 py-3 text-center font-semibold text-slate-600">층</th>
                                <th scope="col" class="px-4 py-3 text-center font-semibold text-slate-600">건축년도</th>
                                <th scope="col" class="px-4 py-3 text-right font-semibold text-slate-600">거래금액</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                            <!-- 데이터 로우 삽입 위치 -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS-h7i-Ar1PHv0Dgs89MqYyAN3mskTzbiqBOHKJyTiGuv8NN4ZAB9V7zfRAnXlI6LURlvqFUCihFE-c/pub?gid=1292559412&single=true&output=csv";
        let chartInstance = null;
        let globalProcessedData = []; // 원본 데이터를 저장할 전역 배열

        // 가격 포맷팅 함수 (예: 150000 만원 -> 15억)
        function formatKoreanCurrency(amountInManwon) {
            if (!amountInManwon || isNaN(amountInManwon)) return "-";
            const amount = parseInt(amountInManwon, 10);
            
            const uk = Math.floor(amount / 10000); // 억 단위
            const man = amount % 10000;          // 만 단위
            
            let result = "";
            if (uk > 0) result += `${uk.toLocaleString()}억 `;
            if (man > 0) result += `${man.toLocaleString()}만`;
            if (result === "") return "0원";
            return result.trim() + "원";
        }

        // 유연한 키 검색 함수
        function getVal(row, keyword) {
            const key = Object.keys(row).find(k => k.replace(/\s+/g, '').includes(keyword));
            return key ? row[key] : '';
        }

        // 데이터 파싱 및 초기화
        async function initDashboard() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error("데이터 로드 오류:", err);
                    document.getElementById("loadingScreen").innerHTML = `<p class="text-red-500 font-bold">데이터를 불러오는데 실패했습니다. URL을 확인해주세요.</p>`;
                }
            });
        }

        // CSV 데이터를 읽어 배열로 변환하고 필터(드롭다운) 초기화
        function processRawData(rawData) {
            globalProcessedData = [];
            const dongSet = new Set(); // 중복 없는 법정동 목록 생성

            rawData.forEach(row => {
                const dateStr = getVal(row, "거래일자");
                const priceStr = getVal(row, "거래금액");
                
                if (!dateStr || !priceStr) return;

                const priceNum = parseInt(priceStr.replace(/,/g, ''), 10);
                if (isNaN(priceNum)) return;

                const dong = getVal(row, "법정동");
                if (dong) dongSet.add(dong);

                globalProcessedData.push({
                    date: dateStr,
                    dong: dong,
                    apt: getVal(row, "아파트명"),
                    area: getVal(row, "전용면적"),
                    floor: getVal(row, "층"),
                    year: getVal(row, "건축년도"),
                    price: priceNum
                });
            });

            if (globalProcessedData.length === 0) {
                document.getElementById("loadingScreen").innerHTML = `<p class="text-slate-500 font-bold">표시할 데이터가 없습니다.</p>`;
                return;
            }

            // 법정동 드롭다운 옵션 추가
            const dongFilter = document.getElementById("dongFilter");
            const sortedDongs = Array.from(dongSet).sort();
            sortedDongs.forEach(dong => {
                const option = document.createElement("option");
                option.value = dong;
                option.textContent = dong;
                dongFilter.appendChild(option);
            });

            // 필터 컨테이너 표시
            document.getElementById("filterContainer").classList.remove("hidden");

            // 드롭다운 변경 이벤트 리스너 추가
            dongFilter.addEventListener("change", (e) => {
                const selectedDong = e.target.value;
                if (selectedDong === "all") {
                    updateDashboardView(globalProcessedData); // 전체 데이터
                } else {
                    const filteredData = globalProcessedData.filter(item => item.dong === selectedDong); // 필터링된 데이터
                    updateDashboardView(filteredData);
                }
            });

            // 업데이트 시간 표시
            const now = new Date();
            document.getElementById("lastUpdated").innerText = `최근 업데이트: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

            // 화면 전환 및 초기 전체 데이터 렌더링
            document.getElementById("loadingScreen").classList.add("hidden");
            document.getElementById("dashboardContent").classList.remove("hidden");
            document.getElementById("dashboardContent").classList.add("fade-in");
            
            updateDashboardView(globalProcessedData);
        }

        // 주어진 데이터를 바탕으로 화면의 카드, 차트, 테이블을 모두 업데이트
        function updateDashboardView(data) {
            let totalCount = data.length;
            let sumPrice = 0;
            let maxPrice = -Infinity;
            let minPrice = Infinity;
            const monthlyData = {};

            // 1. 계산 및 차트용 데이터 분류
            data.forEach(item => {
                sumPrice += item.price;
                if (item.price > maxPrice) maxPrice = item.price;
                if (item.price < minPrice) minPrice = item.price;

                let yearMonth = "Unknown";
                if (item.date.length >= 7) {
                    yearMonth = item.date.substring(0, 7); 
                }
                if (!monthlyData[yearMonth]) {
                    monthlyData[yearMonth] = [];
                }
                monthlyData[yearMonth].push(item.price);
            });

            // 데이터가 없는 동네일 경우 (예외 처리)
            if (totalCount === 0) {
                document.getElementById("totalCount").innerHTML = `0<span class="text-lg font-normal text-slate-500 ml-1">건</span>`;
                document.getElementById("avgPrice").innerText = "0원";
                document.getElementById("maxPrice").innerText = "0원";
                document.getElementById("minPrice").innerText = "0원";
                renderChart({});
                renderTable([]);
                return;
            }

            // 2. 요약 지표 업데이트
            document.getElementById("totalCount").innerHTML = `${totalCount.toLocaleString()}<span class="text-lg font-normal text-slate-500 ml-1">건</span>`;
            document.getElementById("avgPrice").innerText = formatKoreanCurrency(sumPrice / totalCount);
            document.getElementById("maxPrice").innerText = formatKoreanCurrency(maxPrice);
            document.getElementById("minPrice").innerText = formatKoreanCurrency(minPrice);
            
            // 3. 차트 렌더링
            renderChart(monthlyData);

            // 4. 테이블 렌더링 (최신 날짜순 정렬을 위해 복사본 사용)
            const sortedData = [...data].sort((a, b) => new Date(b.date) - new Date(a.date));
            renderTable(sortedData);
        }

        // 차트 그리기
        function renderChart(monthlyData) {
            // 이미 차트가 존재하면 파괴(Destroy) 후 다시 생성해야 겹치지 않음
            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById('priceChart').getContext('2d');
            const labels = Object.keys(monthlyData).sort(); 
            const dataPoints = labels.map(month => {
                const prices = monthlyData[month];
                const avg = prices.reduce((a, b) => a + b, 0) / prices.length;
                return avg; // 만원 단위
            });

            const formatForTooltip = (val) => formatKoreanCurrency(val);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가격',
                        data: dataPoints,
                        borderColor: '#ea580c', // 주황색
                        backgroundColor: 'rgba(234, 88, 12, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#ea580c',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '평균: ' + formatForTooltip(context.raw);
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return Math.round(value / 10000) + '억';
                                }
                            },
                            grid: { color: '#f1f5f9' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 테이블 그리기
        function renderTable(data) {
            const tbody = document.getElementById("tableBody");
            let html = "";

            data.forEach(item => {
                html += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3 whitespace-nowrap text-slate-600">${item.date}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-slate-800">${item.dong}</td>
                        <td class="px-4 py-3 whitespace-nowrap font-medium text-slate-900">${item.apt}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-right text-slate-600">${item.area}㎡</td>
                        <td class="px-4 py-3 whitespace-nowrap text-center text-slate-600">${item.floor}층</td>
                        <td class="px-4 py-3 whitespace-nowrap text-center text-slate-500">${item.year}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-right font-bold text-orange-600">${formatKoreanCurrency(item.price)}</td>
                    </tr>
                `;
            });

            // 데이터가 비었을 때 안내 메시지
            if (data.length === 0) {
                html = `<tr><td colspan="7" class="px-4 py-8 text-center text-slate-500">해당 조건의 거래 데이터가 없습니다.</td></tr>`;
            }

            tbody.innerHTML = html;
        }

        // 페이지 로드 완료 시 대시보드 초기화 시작
        document.addEventListener("DOMContentLoaded", initDashboard);

    </script>
</body>
</html>
